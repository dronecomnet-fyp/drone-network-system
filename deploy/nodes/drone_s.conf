# Node configuration: DRONE_S (system drone relay node, file 08)
# Same image and software as A/B; differs ONLY by the values below.

NODE_ID=DRONE_S
USER_AP_SSID=RESCUE_S
USER_AP_CHANNEL=36
DTN_IP=10.99.0.3
DTN_PEERS=10.99.0.1,10.99.0.2

# MAVLink gateway enabled on this node only (file 08). FC_SERIAL and baud
# are filled in AFTER file 04 Stage 0 identifies the flight controller
# wiring (do not guess port names; docs/DRONE_LINK.md).
DRONE_CONTROL=true
FC_SERIAL=

# No aux module on DRONE_S by default (only two aux sets exist, file 08):
# aux_bridge exits cleanly and /health reports aux absent.
AUX_SERIAL=

ONBOARD_MAC=
DTN_MAC=
