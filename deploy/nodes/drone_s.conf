# Node configuration: DRONE_S (system drone relay node, file 08)
# Same image and software as A/B; differs ONLY by the values below.

NODE_ID=DRONE_S
USER_AP_SSID=RESCUE_S
USER_AP_CHANNEL=36
DTN_IP=10.99.0.3
DTN_PEERS=10.99.0.1,10.99.0.2

# MAVLink gateway enabled on this node only (file 08). The Pi connects to
# the CC3D directly (the ESP32 is removed; no reflash). Two options:
#   RECOMMENDED - the FC's micro-USB port: run a USB-A to micro-USB cable
#     from a Pi USB port to the FC. It appears as /dev/ttyACM0 and speaks
#     MAVLink by default (ArduPilot SERIAL0). Simplest: one cable, no FC
#     config, no wiring. FC_BAUD is ignored over USB CDC but must be set.
#   ALTERNATIVE - GPIO UART: FC telem TX/RX to Pi pins 10/8 (3.3V, no level
#     shifter); FC_SERIAL=/dev/serial0, FC_BAUD to the FC telem baud (often
#     57600). setup_node.sh frees the console from /dev/serial0.
# See DRONE_LINK.md section 4.
DRONE_CONTROL=true
FC_SERIAL=/dev/ttyACM0
FC_BAUD=115200
MAVLINK_UDP_PORT=14550

# No aux module on DRONE_S: no INA3221, no LoRa, no separate GPS. The
# drone's GPS is on the flight controller and the MAVLink gateway feeds it
# into /health. aux_bridge exits cleanly (AUX_SERIAL empty).
AUX_SERIAL=

ONBOARD_MAC=
DTN_MAC=
