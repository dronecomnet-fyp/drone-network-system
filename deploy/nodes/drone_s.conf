# Node configuration: DRONE_S (system drone relay node, file 08)
# Same image and software as A/B; differs ONLY by the values below.

NODE_ID=DRONE_S
USER_AP_SSID=RESCUE_S
USER_AP_CHANNEL=36
DTN_IP=10.99.0.3
DTN_PEERS=10.99.0.1,10.99.0.2

# MAVLink gateway enabled on this node only (file 08). The Pi wires
# directly to the CC3D over serial (the ESP32 is removed; no reflash).
# FC_SERIAL is /dev/serial0 for the Pi GPIO UART (pins 8/10, 3.3V, no
# level shifter) or /dev/ttyUSB0 for a USB-TTL adapter. FC_BAUD matches
# the FC telemetry port (CC3D telem is commonly 57600). See DRONE_LINK.md.
DRONE_CONTROL=true
FC_SERIAL=/dev/serial0
FC_BAUD=57600
MAVLINK_UDP_PORT=14550

# No aux module on DRONE_S: no INA3221, no LoRa, no separate GPS. The
# drone's GPS is on the flight controller and the MAVLink gateway feeds it
# into /health. aux_bridge exits cleanly (AUX_SERIAL empty).
AUX_SERIAL=

ONBOARD_MAC=
DTN_MAC=
