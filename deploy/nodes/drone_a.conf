# Node configuration: DRONE_A (volunteer drone comm module)
# Consumed by deploy/setup_node.sh. Shell syntax, no spaces around '='.

NODE_ID=DRONE_A
USER_AP_SSID=RESCUE_A
# 5 GHz channel; initial choice 36, confirm against TRCSL outdoor guidance
# (master plan R3) before field deployment.
USER_AP_CHANNEL=36
DTN_IP=10.99.0.1
DTN_PEERS=10.99.0.2,10.99.0.3

# System drone extras: off for volunteer modules (scope guard, rule 6)
DRONE_CONTROL=false
FC_SERIAL=

# Aux module serial port (XIAO ESP32-C3 native USB CDC)
AUX_SERIAL=/dev/ttyACM0

# Interface MAC pinning (file 01 step 3). Leave empty for interactive
# detection during setup; fill in after first run for reproducibility.
ONBOARD_MAC=
DTN_MAC=
