name: gcc_app
description: >-
  Rescue Mesh Ground Control Center: Windows desktop app for the ground
  laptop (file 04). Offline operations map, live victim feed, node health,
  personnel PIN issuance, announcements. Drone control tab is gated on
  file 04 Stage 0.
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  file_picker: ^10.0.0
  flutter_map: ^8.1.1
  flutter_map_mbtiles: ^1.0.3
  mbtiles: ^0.4.2
  sqlite3_flutter_libs: ^0.5.24
  latlong2: ^0.9.1
  rescue_mesh_shared:
    path: ../shared_dart
  dart_mavlink: ^0.1.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
