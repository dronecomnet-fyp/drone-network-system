; ESP32-C3 aux module unified firmware (file 03).
; Board: Seeed Studio XIAO ESP32-C3.
; Library versions PINNED for a reproducible build (project rule on
; reproducibility; the Arduino IDE alternative is documented in README.md).

[env:xiao_esp32c3]
platform = espressif32@6.9.0
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200

; Native USB CDC is the Pi link (design v3: /dev/ttyACM0 at 115200).
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    sandeepmistry/LoRa@0.8.0
    mikalhart/TinyGPSPlus@1.0.3
    bblanchon/ArduinoJson@7.2.1
    h2zero/NimBLE-Arduino@1.4.3
