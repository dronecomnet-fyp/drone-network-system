name: emergency_app
description: >-
  Public emergency app (file 06): keeps a small local location log, detects
  a rescue drone's BLE advertisement and notifies the user, and once joined
  to the drone WiFi uploads the stored locations and lets them send an SOS.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  uuid: ^4.5.1
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  flutter_blue_plus: ^1.32.12
  flutter_local_notifications: ^18.0.1
  flutter_foreground_task: ^8.10.0
  workmanager: ^0.9.0+3
  app_settings: ^5.1.1
  rescue_mesh_shared:
    path: ../shared_dart

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
